name: Build DMG and Release (fork)

# Builds an unsigned .dmg on every push to main and publishes it as a dated
# GitHub Release, so the README download button always points at the newest build.
# Fork-only convenience flow; independent of the upstream signed release workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fork-dmg-release
  cancel-in-progress: true

jobs:
  build:
    # Runs on the self-hosted ARM64 Mac runner (uses its installed Xcode/toolchain).
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v5
        with:
          # Need write access + full history to commit the version bump back.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump patch version
        id: version
        run: |
          PBX=boringNotch.xcodeproj/project.pbxproj
          CUR=$(grep -m1 'MARKETING_VERSION' "$PBX" | sed -E 's/.*= ([0-9.]+);/\1/')
          IFS=. read -r MAJ MIN PAT <<< "$CUR"
          NEW="${MAJ}.${MIN}.$((PAT + 1))"
          # Update every MARKETING_VERSION occurrence (Debug + Release configs).
          sed -i '' -E "s/MARKETING_VERSION = [0-9.]+;/MARKETING_VERSION = ${NEW};/g" "$PBX"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped $CUR -> $NEW"

      - name: Build Release app
        run: |
          xcodebuild -project boringNotch.xcodeproj -scheme boringNotch \
            -configuration Release -destination 'platform=macOS' \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO build

      - name: Install dmgbuild
        run: |
          python3 -m venv .dmgvenv
          .dmgvenv/bin/pip install --require-hashes -r Configuration/dmg/requirements.txt

      - name: Create DMG
        run: |
          mkdir -p dist
          # create_dmg.sh finds dmgbuild on PATH.
          PATH="$PWD/.dmgvenv/bin:$PATH" \
            Configuration/dmg/create_dmg.sh \
              build/Build/Products/Release/boringNotch.app \
              dist/boringNotch.dmg "Boring Notch"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add boringNotch.xcodeproj/project.pbxproj
          git commit -m "Bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Publish release
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            dist/boringNotch.dmg \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "boringNotch ${{ steps.version.outputs.version }} — automated build from ${GITHUB_SHA:0:7}." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
